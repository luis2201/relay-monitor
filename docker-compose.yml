services:
  relay-monitor-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relay-monitor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      HOST: 0.0.0.0
    ports:
      - "4100:4100"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
